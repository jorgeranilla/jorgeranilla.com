<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Album | Jorge Ranilla</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../family/family-gallery.css?v=3">
  <link rel="icon" type="image/png" href="../../images/jr-logo.png">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Photo Album | Jorge Ranilla">
  <meta property="og:description" content="Photos gathered from shared memories.">
  <meta property="og:image" content="https://jorgeranilla.com/images/og-banner.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Photo Album | Jorge Ranilla">
  <meta name="twitter:description" content="Photos gathered from shared memories.">
  <meta name="twitter:image" content="https://jorgeranilla.com/images/og-banner.png">
  <style>
    .gallery-item--video { background: #1a1a1a; }
    .gallery-item--video img { opacity: 0.75; }
    .video-play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .video-play-btn svg {
      width: 56px;
      height: 56px;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      padding: 12px;
      transition: transform 0.2s ease;
    }
    .gallery-item--video:hover .video-play-btn svg { transform: scale(1.15); }
    #lightboxVideo {
      display: none;
      width: 90vw;
      max-width: 960px;
      height: 60vh;
      border: none;
      border-radius: 6px;
    }
</style>
</head>

<body data-title="Photo Album" data-section="Gallery">
  <div id="social-rail-placeholder"></div>
  <div id="header-placeholder"></div>

  <div class="breadcrumb-bar">
    <nav id="breadcrumbs" class="breadcrumb-container" aria-label="Breadcrumb"></nav>
  </div>

  <main class="page-content">
    <div class="gallery-container">
      <div class="gallery-intro">
        <h2 class="page-title page-title--sm" id="album-title">Photo Album</h2>
        <p id="album-description">
          Photos gathered from shared memories. As pictures are tagged, they will appear here automatically.
          Click any photo or video to view it full size.
        </p>
        <div class="photo-count" id="photo-count" style="display:none;"></div>
      </div>

      <div class="gallery-loading" id="gallery-loading">
        <div class="spinner"></div>
        <p id="album-loading">Loading photos...</p>
      </div>

      <div class="gallery-error" id="gallery-error" style="display:none;">
        <p>Couldn't load photos right now. Please try refreshing the page.</p>
      </div>

      <div class="gallery-grid" id="gallery"></div>

      <div class="gallery-pagination" id="gallery-pagination">
        <button class="page-btn" id="page-prev" onclick="changePage(-1)" aria-label="Previous page" title="Previous page">&lsaquo;</button>
        <span class="page-indicator" id="page-indicator">1 / 1</span>
        <button class="page-btn" id="page-next" onclick="changePage(1)" aria-label="Next page" title="Next page">&rsaquo;</button>
      </div>

      <div class="back-link-container">
        <a href="../../index.html" class="back-to-profile" id="album-back-link">&larr; Back to Profile</a>
      </div>
    </div>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous">&#10094;</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next">&#10095;</button>
    <div class="lightbox-counter" id="lightboxCounter">1 / 1</div>
    <div class="lightbox-content">
      <img src="" alt="People photo" id="lightboxImg">
      <iframe id="lightboxVideo" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>

  <script src="../../script.js"></script>
  <script src="../../search-dynamic.js"></script>
  <script src="../family/smart-family-gallery.js?v=13"></script>
  <script>
    const PEOPLE_FOLDER_ID = '1cGKKik8MCXTWG6Ulc3z3rXIFwVSXcb8K';
    const params = new URLSearchParams(window.location.search);
    const personSlug = params.get('person') || '';
    const displayName = params.get('name') || titleFromSlug(personSlug) || 'Person';
    const aliases = [params.get('alias'), firstNameSlug(displayName), firstNameSlug(personSlug)]
      .filter(Boolean)
      .filter((value, index, list) => list.indexOf(value) === index);

    document.title = `${displayName} Photo Album | Jorge Ranilla`;
    document.body.setAttribute('data-title', `${displayName} Photo Album`);

    document.getElementById('album-title').textContent = `${displayName} Photo Album`;
    document.getElementById('album-description').textContent =
      `Photos of ${displayName} gathered from the People folder as they are tagged and published. Click any photo or video to view it full size.`;
    document.getElementById('album-loading').textContent = `Loading ${displayName}'s photos...`;

    const backLink = document.getElementById('album-back-link');
    backLink.href = `../../people/${personSlug}.html`;
    backLink.textContent = `\u2190 Back to ${displayName}'s Profile`;

    JRFamilyGallery.start({
      mode: 'person',
      masterFolderId: PEOPLE_FOLDER_ID,
      personSlug,
      personAliases: aliases,
      albumSlug: 'people',
      pageSize: 25,
      emptyText: `No tagged photos for ${displayName} yet.`,
      errorText: "Couldn't load photos right now. Please try refreshing the page.",
      photoAlt: `${displayName} photo`,
      videoAlt: `${displayName} video`
    });

    function titleFromSlug(slug) {
      return String(slug || '')
        .split('-')
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');
    }

    function firstNameSlug(value) {
      return String(value || '')
        .trim()
        .split(/[\s-]+/)
        .filter(Boolean)[0]
        ?.toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-') || '';
    }
  </script>
</body>

</html>
