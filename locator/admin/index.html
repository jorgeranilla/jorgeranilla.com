<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jorge Ranilla | Locator Admin</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" type="image/png" href="../../images/jr-logo.png">
    <link rel="stylesheet" href="../locator.css">
  </head>
  <body>
    <main class="locator-shell">
      <section class="locator-card">
        <img class="locator-avatar locator-avatar--small" src="../../images/jorge.jpg" alt="Jorge Ranilla">
        <p class="locator-kicker">Admin</p>
        <h1>Location Sharing</h1>

        <form id="login-form" class="locator-form">
          <button id="google-login" class="locator-button locator-button--primary" type="submit">Sign in with Google</button>
          <p id="login-error" class="locator-message" role="alert"></p>
        </form>

        <section id="admin-panel" class="locator-admin hidden" aria-live="polite">
          <div class="locator-status-grid">
            <div>
              <span>Status</span>
              <strong id="current-status">Inactive</strong>
            </div>
            <div>
              <span>Last update</span>
              <strong id="last-update">Never</strong>
            </div>
          </div>

          <label class="locator-duration-label" for="duration">Duration</label>
          <select id="duration">
            <option value="1800000">30 minutes</option>
            <option value="3600000">1 hour</option>
            <option value="7200000">2 hours</option>
            <option value="14400000">4 hours</option>
          </select>

          <div class="locator-actions">
            <button id="start-sharing" class="locator-button locator-button--primary" type="button">Start Sharing</button>
            <button id="stop-sharing" class="locator-button locator-button--danger" type="button">Stop Sharing</button>
          </div>

          <p id="admin-message" class="locator-message" role="status"></p>
          <button id="logout" class="locator-text-button" type="button">Log Out</button>
        </section>
      </section>
    </main>

    <script type="module" src="../shared/location-admin.js"></script>
  </body>
</html>
