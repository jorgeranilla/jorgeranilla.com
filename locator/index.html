<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jorge Ranilla | Locator</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="../images/jr-logo.png">
    <link rel="stylesheet" href="./locator.css">
  </head>
  <body>
    <main class="locator-shell">
      <section class="locator-card" aria-live="polite">
        <img class="locator-avatar" src="../images/jorge.jpg" alt="Jorge Ranilla">
        <h1 id="status-message">Jorge is not sharing his location right now.</h1>

        <div id="location-content" class="hidden">
          <div id="map" class="locator-map" aria-label="Map centered on Jorge's live coordinates"></div>

          <dl class="locator-details">
            <div>
              <dt>Latitude</dt>
              <dd id="latitude"></dd>
            </div>
            <div>
              <dt>Longitude</dt>
              <dd id="longitude"></dd>
            </div>
            <div>
              <dt>Accuracy</dt>
              <dd id="accuracy"></dd>
            </div>
            <div>
              <dt>Last updated</dt>
              <dd id="updated-at"></dd>
            </div>
          </dl>
        </div>
      </section>
    </main>

    <script type="module" src="./shared/location-public.js"></script>
  </body>
</html>
